# Mapeo complejo para JSON con estructura caótica/legacy
# Demuestra: fallbacks, transforms, defaults, y reestructuración de datos

rootType: UserEvent

fields:
  eventType:
    type: string
    source: [event_type, eventType]
    required: true

  visitorId:
    type: string
    source: [user_visitor_id, visitor_id, user_id, customer.id]
    required: true

  sessionId:
    type: string
    source: [session, session_id, sessionId]

  eventTime:
    type: timestamp
    source: [timestamp, event_timestamp, created_at]
    format: unix_millis

  attributionToken:
    type: string
    source: [tracking_token, attribution_token, attributionToken]

  uri:
    type: string
    source: [page_url, current_url, uri]

  referrerUri:
    type: string
    source: [source_url, referrer_url, referrerUri]

  cartId:
    type: string
    source: [cart_identifier, cart_id, cartId]

  # Transform: string CSV a array
  experimentIds:
    type: array
    itemType: string
    source: [ab_tests, experiments, experimentIds]
    transform: splitToArray
    transformParams:
      delimiter: ","

  userInfo:
    type: object
    objectType: UserInfo
    source: [customer, user_info, userInfo]
    fields:
      userId:
        type: string
        source: [id, user_id, userId]
      ipAddress:
        type: string
        source: [ip, ip_address, ipAddress]
      userAgent:
        type: string
        source: [browser, user_agent, userAgent]
      directUserRequest:
        type: boolean
        source: [is_direct, direct_request, directUserRequest]

  # Reestructuración compleja: items[] -> productDetails[]
  productDetails:
    type: array
    itemType: ProductDetail
    source: [items, products, productDetails]
    fields:
      product:
        type: object
        objectType: Product
        # Use "." to indicate current context (same JSON node)
        source: ["."]
        fields:
          id:
            type: string
            source: [sku, product_id, id]
          title:
            type: string
            source: [name, product_name, title]
          # Transform: string path a array de categorías
          categories:
            type: array
            itemType: string
            source: [category_path, categories]
            transform: splitToArray
            transformParams:
              delimiter: " > "
          priceInfo:
            type: object
            objectType: PriceInfo
            # Use current context for flat field mapping
            source: ["."]
            fields:
              price:
                type: float
                source: [price_usd, current_price, price]
              originalPrice:
                type: float
                source: [original_price_usd, list_price, originalPrice]
              currencyCode:
                type: string
                source: [currency, currencyCode]
                default: "USD"
      quantity:
        type: int32
        source: [qty, quantity, amount]
        default: 1
